<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Δ Remote · SIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #0b1a33; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
    .remote-container { max-width: 420px; width: 100%; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-radius: 32px; padding: 2rem 1.5rem 2.5rem; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .remote-header { text-align: center; margin-bottom: 2rem; }
    .remote-header .logo { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .remote-header .logo svg { height: 32px; width: auto; }
    .remote-header .logo h1 { color: #fff; font-weight: 300; font-size: 1.4rem; letter-spacing: 0.05em; }
    .remote-header .logo h1 span { font-weight: 700; color: #d32f2f; }
    .remote-header .status { color: rgba(255,255,255,0.3); font-size: 0.7rem; margin-top: 0.3rem; letter-spacing: 0.1em; }
    .token-section { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .token-section label { color: rgba(255,255,255,0.5); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; }
    .token-section input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 0.5rem 1rem; color: #fff; font-size: 0.8rem; outline: none; width: 100%; }
    .token-section input:focus { border-color: #d32f2f; }
    .nav-row { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; }
    .nav-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 60px; padding: 1rem 2rem; color: #fff; font-size: 2.4rem; font-weight: 300; cursor: pointer; transition: all 0.15s ease; min-width: 80px; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); touch-action: manipulation; }
    .nav-btn:active { transform: scale(0.92); background: rgba(211,47,47,0.2); border-color: rgba(211,47,47,0.3); }
    .slide-numbers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
    .slide-number { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 0.8rem 0; color: rgba(255,255,255,0.5); font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.15s ease; text-align: center; touch-action: manipulation; }
    .slide-number:active { transform: scale(0.92); background: rgba(211,47,47,0.15); border-color: rgba(211,47,47,0.3); color: #fff; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 0.8rem; }
    .action-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 0.8rem 0.5rem; color: rgba(255,255,255,0.6); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.15s ease; text-align: center; touch-action: manipulation; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
    .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.08); }
    .action-btn.fullscreen { border-color: rgba(253,185,19,0.2); color: #fdb913; }
    .action-btn.fullscreen:active { background: rgba(253,185,19,0.1); }
    .action-btn.refresh { border-color: rgba(46,204,113,0.2); color: #2ecc71; }
    .action-btn.refresh:active { background: rgba(46,204,113,0.1); }
    .action-btn.playpause { border-color: rgba(211,47,47,0.2); color: #d32f2f; }
    .action-btn.playpause:active { background: rgba(211,47,47,0.1); }
    .status-msg { margin-top: 0.8rem; padding: 0.4rem 0.8rem; border-radius: 6px; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.4); }
    .status-msg.success { background: rgba(46,204,113,0.1); color: #2ecc71; }
    .status-msg.error { background: rgba(211,47,47,0.1); color: #d32f2f; }
    @media (max-width: 400px) { .remote-container { padding: 1.5rem 1rem 2rem; } .nav-btn { font-size: 2rem; padding: 0.8rem 1.2rem; min-width: 60px; } .slide-number { font-size: 1rem; padding: 0.6rem 0; } .action-btn { font-size: 0.75rem; padding: 0.6rem 0.3rem; } }
  </style>
</head>
<body>
  <div class="remote-container">
    <div class="remote-header">
      <div class="logo">
        <svg viewBox="0 0 60 50" fill="none" width="32" height="28">
          <path d="M30 2 L2 46 L58 46 L30 2Z" fill="#d32f2f" stroke="#d32f2f" stroke-width="2"/>
          <path d="M30 10 L10 44 L50 44 L30 10Z" fill="#0b1a33" stroke="#0b1a33" stroke-width="1.5"/>
          <text x="30" y="38" font-size="14" font-weight="700" fill="#d32f2f" text-anchor="middle" font-family="Segoe UI, sans-serif">Δ</text>
        </svg>
        <h1><span>DELTA</span> · SIS</h1>
      </div>
      <div class="status">Remote Control · Anywhere</div>
    </div>

    <div class="token-section">
      <label for="tokenField">🔑 GitHub Token (repo scope)</label>
      <input type="password" id="tokenField" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">◀</button>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>

    <div class="slide-numbers">
      <button class="slide-number" data-slide="0">1</button>
      <button class="slide-number" data-slide="1">2</button>
      <button class="slide-number" data-slide="2">3</button>
      <button class="slide-number" data-slide="3">4</button>
    </div>

    <div class="action-row">
      <button class="action-btn fullscreen" id="fullscreenBtn">⛶ FULL</button>
      <button class="action-btn playpause" id="playPauseBtn">▶ PLAY</button>
    </div>
    <div class="action-row" style="grid-template-columns: 1fr;">
      <button class="action-btn refresh" id="refreshBtn">🔄 REFRESH TV</button>
    </div>

    <div class="status-msg" id="statusMsg">Ready</div>
  </div>

  <script>
    // =============================================
    // CROSS-DEVICE REMOTE – NO SHA ERRORS
    // =============================================

    const REPO_OWNER = 'naasifveroni-creator';
    const REPO_NAME = 'sis-leaderboard';
    const COMMAND_FILE = 'command.json';

    const statusMsg = document.getElementById('statusMsg');
    const tokenField = document.getElementById('tokenField');

    // Load token from localStorage
    if (localStorage.getItem('deltaRemoteToken')) {
      tokenField.value = localStorage.getItem('deltaRemoteToken');
    }
    tokenField.addEventListener('change', function() {
      localStorage.setItem('deltaRemoteToken', this.value);
    });

    function getRepoPath() {
      return REPO_OWNER + '/' + REPO_NAME;
    }

    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg ' + (type || '');
      if (type) {
        setTimeout(() => {
          statusMsg.className = 'status-msg';
        }, 4000);
      }
    }

    async function sendCommand(command) {
      const token = tokenField.value.trim();
      if (!token) {
        showStatus('❌ Please enter your GitHub token.', 'error');
        return;
      }

      const timestamp = Date.now();
      const payload = { command, timestamp };
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));

      try {
        const fileUrl = `https://api.github.com/repos/${getRepoPath()}/contents/${COMMAND_FILE}`;

        // Step 1: Get the current SHA (required for updating)
        let sha = null;
        try {
          const headRes = await fetch(fileUrl, {
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
          });
          if (headRes.ok) {
            const fileMeta = await headRes.json();
            sha = fileMeta.sha;
          } else if (headRes.status === 404) {
            showStatus('❌ command.json not found. Create it with {}', 'error');
            return;
          } else {
            throw new Error('Failed to fetch file info');
          }
        } catch (e) {
          showStatus('❌ Error fetching file: ' + e.message, 'error');
          return;
        }

        // Step 2: Update the file
        const commitRes = await fetch(fileUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json',
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: `Remote command: ${command}`,
            content: content,
            sha: sha
          })
        });

        if (!commitRes.ok) {
          const err = await commitRes.json();
          // If the error is about SHA mismatch, fetch the latest SHA and retry once
          if (err.message && err.message.includes('sha')) {
            // Retry: fetch the latest SHA and try again
            const retryRes = await fetch(fileUrl, {
              headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (retryRes.ok) {
              const fileMeta = await retryRes.json();
              const retrySha = fileMeta.sha;
              const retryCommit = await fetch(fileUrl, {
                method: 'PUT',
                headers: {
                  'Authorization': `token ${token}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                  message: `Remote command: ${command}`,
                  content: content,
                  sha: retrySha
                })
              });
              if (retryCommit.ok) {
                showStatus(`✅ Command sent: ${command}`, 'success');
                return;
              }
            }
          }
          throw new Error(err.message || 'Commit failed');
        }

        showStatus(`✅ Command sent: ${command}`, 'success');

      } catch (e) {
        showStatus(`❌ Error: ${e.message}`, 'error');
      }
    }

    // ---- Button handlers ----
    document.getElementById('prevBtn').addEventListener('click', function() {
      sendCommand('prev');
      if (navigator.vibrate) navigator.vibrate(10);
    });
    document.getElementById('nextBtn').addEventListener('click', function() {
      sendCommand('next');
      if (navigator.vibrate) navigator.vibrate(10);
    });
    document.querySelectorAll('.slide-number').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const slideIndex = parseInt(this.dataset.slide);
        sendCommand('slide:' + slideIndex);
        if (navigator.vibrate) navigator.vibrate(10);
      });
    });
    document.getElementById('fullscreenBtn').addEventListener('click', function() {
      sendCommand('fullscreen');
      if (navigator.vibrate) navigator.vibrate(10);
    });

    let isPlaying = true;
    document.getElementById('playPauseBtn').addEventListener('click', function() {
      isPlaying = !isPlaying;
      this.textContent = isPlaying ? '▶ PLAY' : '⏸ PAUSE';
      sendCommand(isPlaying ? 'play' : 'pause');
      if (navigator.vibrate) navigator.vibrate(10);
    });
    document.getElementById('refreshBtn').addEventListener('click', function() {
      sendCommand('refresh');
      if (navigator.vibrate) navigator.vibrate(20);
    });

    // ---- Keyboard shortcuts ----
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') { sendCommand('next'); e.preventDefault(); }
      if (e.key === 'ArrowLeft') { sendCommand('prev'); e.preventDefault(); }
      if (e.key === 'f') { sendCommand('fullscreen'); e.preventDefault(); }
      if (e.key === 'r') { sendCommand('refresh'); e.preventDefault(); }
      if (e.key === ' ') { document.getElementById('playPauseBtn').click(); e.preventDefault(); }
      if (e.key >= '1' && e.key <= '4') { const idx = parseInt(e.key) - 1; sendCommand('slide:' + idx); e.preventDefault(); }
    });

    console.log('🌐 Cross-device remote ready.');
  </script>
</body>
</html>
