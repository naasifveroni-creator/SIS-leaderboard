<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Δ SIS Performance · Delta</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #0b1a33;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .slide-deck {
      max-width: 1200px;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0b1a33;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      position: relative;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      display: flex;
      flex-direction: column;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      position: relative;
    }

    /* ========== SLIDE 0: TITLE ========== */
    #slide0 {
      background: url('slide-title.webp.jpg') center/cover no-repeat, #0b1a33;
    }

    /* ========== SLIDE 1: BEHAVIORS ========== */
    #slide1 {
      background: url('slide-data.webp.jpg') center/cover no-repeat, #0b1a33;
    }

    /* ========== SLIDE 2 & 3: LEADERBOARD ========== */
    #slide2,
    #slide3 {
      background: #f0f3f8;
      padding: 0;
    }

    .slide-header {
      background: #0b1a33;
      padding: 0.4rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.2rem 1rem;
      flex-shrink: 0;
      min-height: 50px;
    }

    .slide-header .logo-area {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .slide-header .logo-area svg {
      height: 26px;
      width: auto;
    }

    .slide-header .logo-area h1 {
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 1px;
      color: #fff;
    }

    .slide-header .logo-area h1 span {
      font-weight: 700;
      color: #d32f2f;
    }

    .behavior-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.15rem 0.5rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 0.15rem 0.6rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .behavior-tags .tag {
      color: #fff;
      font-size: 0.45rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .behavior-tags .divider {
      color: rgba(255, 255, 255, 0.15);
      font-weight: 300;
    }

    .behavior-tags .tag.red {
      color: #d32f2f;
    }

    .behavior-tags .tag.coach {
      color: #8a9bb0;
    }

    /* ===== TABLE CONTAINER ===== */
    .table-wrap {
      flex: 1;
      overflow: hidden;
      padding: 0.3rem 2rem 0.2rem;
      background: #f0f3f8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(11, 26, 51, 0.06);
    }

    .table-wrap th {
      background: #f5f7fc;
      color: #1a2a4a;
      font-weight: 600;
      padding: 0.25rem 0.8rem;
      text-align: left;
      border-bottom: 2px solid #dce2ec;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ===== AGENTS TABLE (10 rows) – normal size ===== */
    #slide2 .table-wrap td {
      padding: 0.25rem 0.8rem;
      border-bottom: 1px solid #edf0f6;
      vertical-align: middle;
      color: #0b1a33;
      font-size: 0.7rem;
    }

    /* ===== TEAMS TABLE (17 rows) – SMALLER to fit ===== */
    #slide3 .table-wrap td {
      padding: 0.15rem 0.8rem;
      border-bottom: 1px solid #edf0f6;
      vertical-align: middle;
      color: #0b1a33;
      font-size: 0.6rem;
    }

    #slide3 .table-wrap th {
      padding: 0.15rem 0.8rem;
      font-size: 0.5rem;
    }

    .table-wrap tr:last-child td {
      border-bottom: none;
    }

    .table-wrap .rank-col {
      width: 10%;
      color: #6b7f96;
      font-weight: 600;
    }

    .table-wrap .name-col {
      font-weight: 500;
    }

    .table-wrap .score-col {
      font-weight: 700;
      text-align: right;
      width: 12%;
      color: #0b1a33;
    }

    .table-wrap tr.top1 td {
      background: #fef0ee;
    }

    .table-wrap tr.top1 .rank-col {
      color: #d32f2f;
      font-weight: 800;
    }

    .table-wrap tr.top1 .score-col {
      color: #d32f2f;
      font-size: 1.05em;
    }

    .table-wrap .empty-state {
      padding: 1.5rem;
      text-align: center;
      color: #8a9bb0;
      background: #fff;
      border-radius: 10px;
      width: 100%;
    }

    /* ---------- NAVIGATION ---------- */
    .nav-controls {
      position: absolute;
      bottom: 2%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      z-index: 20;
      pointer-events: none;
    }

    .nav-controls button,
    .nav-controls .dot {
      pointer-events: auto;
    }

    .arrow {
      background: rgba(11, 26, 51, 0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow:hover {
      background: #d32f2f;
      transform: scale(1.05);
    }

    .dots {
      display: flex;
      gap: 0.6rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      cursor: pointer;
      transition: 0.25s;
      padding: 0;
    }

    .dot.active {
      background: #d32f2f;
      transform: scale(1.3);
    }

    .dot:hover {
      background: #fff;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 800px) {
      .slide-header {
        padding: 0.2rem 1rem;
        min-height: 38px;
      }
      .slide-header .logo-area h1 {
        font-size: 0.7rem;
      }
      .slide-header .logo-area svg {
        height: 18px;
      }
      .behavior-tags {
        padding: 0.1rem 0.4rem;
        gap: 0.1rem 0.3rem;
      }
      .behavior-tags .tag {
        font-size: 0.35rem;
      }
      .table-wrap {
        padding: 0.2rem 0.8rem 0.1rem;
      }
      #slide2 .table-wrap td {
        font-size: 0.55rem;
        padding: 0.15rem 0.5rem;
      }
      #slide3 .table-wrap td {
        font-size: 0.45rem;
        padding: 0.1rem 0.5rem;
      }
      #slide2 .table-wrap th {
        font-size: 0.45rem;
        padding: 0.15rem 0.5rem;
      }
      #slide3 .table-wrap th {
        font-size: 0.4rem;
        padding: 0.1rem 0.5rem;
      }
      .arrow {
        width: 26px;
        height: 26px;
        font-size: 0.7rem;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 0.3rem;
      }
      .slide-deck {
        border-radius: 8px;
      }
      .slide-header {
        flex-direction: column;
        align-items: flex-start;
        padding: 0.15rem 0.5rem;
        min-height: 30px;
        gap: 0.1rem;
      }
      .slide-header .logo-area h1 {
        font-size: 0.55rem;
      }
      .slide-header .logo-area svg {
        height: 14px;
      }
      .behavior-tags {
        padding: 0.08rem 0.3rem;
        gap: 0.08rem 0.2rem;
      }
      .behavior-tags .tag {
        font-size: 0.3rem;
      }
      .behavior-tags .divider {
        display: none;
      }
      .table-wrap {
        padding: 0.15rem 0.3rem 0.05rem;
      }
      #slide2 .table-wrap td {
        font-size: 0.45rem;
        padding: 0.1rem 0.3rem;
      }
      #slide3 .table-wrap td {
        font-size: 0.35rem;
        padding: 0.05rem 0.3rem;
      }
      #slide2 .table-wrap th {
        font-size: 0.4rem;
        padding: 0.1rem 0.3rem;
      }
      #slide3 .table-wrap th {
        font-size: 0.35rem;
        padding: 0.05rem 0.3rem;
      }
      .table-wrap .rank-col {
        width: 15%;
      }
      .dot {
        width: 7px;
        height: 7px;
      }
      .arrow {
        width: 22px;
        height: 22px;
        font-size: 0.6rem;
      }
    }

    /* TV / Projector */
    @media (min-width: 1400px) {
      .slide-deck {
        max-width: 90vh;
        max-height: 90vh;
      }
      .slide-header {
        min-height: 70px;
        padding: 0.8rem 3rem;
      }
      .slide-header .logo-area h1 {
        font-size: 1.4rem;
      }
      .slide-header .logo-area svg {
        height: 36px;
      }
      .behavior-tags .tag {
        font-size: 0.7rem;
      }
      .table-wrap {
        padding: 0.6rem 3rem 0.4rem;
      }
      #slide2 .table-wrap th {
        font-size: 0.8rem;
        padding: 0.5rem 1.2rem;
      }
      #slide2 .table-wrap td {
        font-size: 0.85rem;
        padding: 0.4rem 1.2rem;
      }
      #slide3 .table-wrap th {
        font-size: 0.7rem;
        padding: 0.3rem 1.2rem;
      }
      #slide3 .table-wrap td {
        font-size: 0.75rem;
        padding: 0.25rem 1.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="slide-deck">
    <div class="slides-wrapper" id="slidesWrapper">

      <!-- SLIDE 0: TITLE -->
      <div class="slide active" id="slide0" data-index="0"></div>

      <!-- SLIDE 1: BEHAVIORS -->
      <div class="slide" id="slide1" data-index="1"></div>

      <!-- SLIDE 2: AGENTS -->
      <div class="slide" id="slide2" data-index="2">
        <div class="slide-header">
          <div class="logo-area">
            <svg viewBox="0 0 60 50" fill="none" width="34" height="28">
              <path d="M30 2 L2 46 L58 46 L30 2Z" fill="#d32f2f" stroke="#d32f2f" stroke-width="2"/>
              <path d="M30 10 L10 44 L50 44 L30 10Z" fill="#0b1a33" stroke="#0b1a33" stroke-width="1.5"/>
              <text x="30" y="38" font-size="14" font-weight="700" fill="#d32f2f" text-anchor="middle">Δ</text>
            </svg>
            <h1><span>DELTA</span> · SIS</h1>
          </div>
          <div class="behavior-tags">
            <span class="tag">GREET ME</span>
            <span class="divider">|</span>
            <span class="tag">RECOGNIZE ME</span>
            <span class="divider">|</span>
            <span class="tag">BE KIND TO ME</span>
            <span class="divider">|</span>
            <span class="tag">INFORM ME</span>
            <span class="divider">|</span>
            <span class="tag red">CONSISTENTLY EXECUTED</span>
            <span class="divider">|</span>
            <span class="tag coach">Leaders as Coaches</span>
          </div>
        </div>
        <div class="table-wrap" id="agentTableWrap">
          <div class="empty-state">Loading agents…</div>
        </div>
      </div>

      <!-- SLIDE 3: TEAMS -->
      <div class="slide" id="slide3" data-index="3">
        <div class="slide-header">
          <div class="logo-area">
            <svg viewBox="0 0 60 50" fill="none" width="34" height="28">
              <path d="M30 2 L2 46 L58 46 L30 2Z" fill="#d32f2f" stroke="#d32f2f" stroke-width="2"/>
              <path d="M30 10 L10 44 L50 44 L30 10Z" fill="#0b1a33" stroke="#0b1a33" stroke-width="1.5"/>
              <text x="30" y="38" font-size="14" font-weight="700" fill="#d32f2f" text-anchor="middle">Δ</text>
            </svg>
            <h1><span>DELTA</span> · SIS</h1>
          </div>
          <div class="behavior-tags">
            <span class="tag">GREET ME</span>
            <span class="divider">|</span>
            <span class="tag">RECOGNIZE ME</span>
            <span class="divider">|</span>
            <span class="tag">BE KIND TO ME</span>
            <span class="divider">|</span>
            <span class="tag">INFORM ME</span>
            <span class="divider">|</span>
            <span class="tag red">CONSISTENTLY EXECUTED</span>
            <span class="divider">|</span>
            <span class="tag coach">Leaders as Coaches</span>
          </div>
        </div>
        <div class="table-wrap" id="teamTableWrap">
          <div class="empty-state">Loading teams…</div>
        </div>
      </div>

      <!-- NAVIGATION -->
      <div class="nav-controls">
        <button class="arrow" id="prevSlide">‹</button>
        <div class="dots" id="dotsContainer"></div>
        <button class="arrow" id="nextSlide">›</button>
      </div>

    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dotsContainer');
    let currentIndex = 0;
    let autoPlayInterval = null;
    const AUTO_DELAY = 5500;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.dataset.index = i;
      dot.addEventListener('click', () => goToSlide(i));
      dotsContainer.appendChild(dot);
    });
    const dots = dotsContainer.querySelectorAll('.dot');

    function goToSlide(index) {
      if (index === currentIndex) return;
      if (index < 0) index = slides.length - 1;
      if (index >= slides.length) index = 0;
      slides[currentIndex].classList.remove('active');
      dots[currentIndex].classList.remove('active');
      currentIndex = index;
      slides[currentIndex].classList.add('active');
      dots[currentIndex].classList.add('active');
      resetAutoPlay();
    }

    function nextSlide() { goToSlide(currentIndex + 1); }
    function prevSlide() { goToSlide(currentIndex - 1); }

    function resetAutoPlay() {
      if (autoPlayInterval) clearInterval(autoPlayInterval);
      autoPlayInterval = setInterval(nextSlide, AUTO_DELAY);
    }

    document.getElementById('nextSlide').addEventListener('click', nextSlide);
    document.getElementById('prevSlide').addEventListener('click', prevSlide);

    const wrapper = document.getElementById('slidesWrapper');
    wrapper.addEventListener('mouseenter', () => {
      if (autoPlayInterval) {
        clearInterval(autoPlayInterval);
        autoPlayInterval = null;
      }
    });
    wrapper.addEventListener('mouseleave', resetAutoPlay);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    function renderTable(containerId, items, type) {
      const container = document.getElementById(containerId);
      if (!items || items.length === 0) {
        container.innerHTML = `<div class="empty-state">No data available.</div>`;
        return;
      }

      let html = `<table>
        <thead><tr>
          <th class="rank-col">#</th>
          <th>${type === 'team' ? 'Team Leader' : 'Agent Name'}</th>
          ${type === 'agent' ? '<th>Team Leader</th>' : ''}
          <th class="score-col">SIS</th>
        </tr></thead><tbody>`;

      items.forEach(item => {
        const isFirst = item.rank === 1;
        html += `<tr class="${isFirst ? 'top1' : ''}">
          <td class="rank-col">${item.rank}</td>
          <td class="name-col">${item.name}</td>
          ${type === 'agent' ? `<td>${item.team || '—'}</td>` : ''}
          <td class="score-col">${item.score}</td>
        </tr>`;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    async function loadData() {
      try {
        const res = await fetch('data.json?' + Date.now());
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();
        renderTable('teamTableWrap', data.teams, 'team');
        renderTable('agentTableWrap', data.agents, 'agent');
      } catch (e) {
        document.getElementById('teamTableWrap').innerHTML =
          '<div class="empty-state">⚠️ Could not load data. Refresh or try again later.</div>';
        document.getElementById('agentTableWrap').innerHTML = '';
      }
    }

    loadData();
    resetAutoPlay();
  </script>

</body>
</html>
