<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Δ SIS Performance · Delta</title>
  <style>
    /* ---------- SHARED BASE (Navy · Red · Grey) ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }
    body {
      background: #dce2ec; /* darker grey backdrop to make the "slide" pop */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .slide-deck {
      max-width: 1100px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(11, 26, 51, 0.25);
      overflow: hidden;
      position: relative;
    }

    /* ---------- HEADER (fixed on every slide) ---------- */
    .header {
      background: #0b1a33;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-area svg {
      height: 40px;
      width: auto;
    }
    .logo-area h1 {
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 0.5px;
    }
    .logo-area h1 span {
      font-weight: 700;
      color: #d32f2f; /* RED accent */
    }
    .week-badge {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }

    /* ---------- BEHAVIOR BAR (fixed on every slide) ---------- */
    .behavior-bar {
      background: #e9edf4;
      padding: 0.6rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem 1.5rem;
      border-bottom: 3px solid #0b1a33;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      color: #0b1a33;
    }
    .behavior-bar .pill {
      background: #0b1a33;
      color: #fff;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .behavior-bar .pill.red {
      background: #d32f2f;
      color: #fff;
    }
    .behavior-bar .pill.coach {
      background: #2a4a7f;
      color: #fff;
    }
    .behavior-divider {
      color: #8a9bb0;
      font-weight: 300;
    }

    /* ---------- SLIDESHOW CONTAINER ---------- */
    .slides-wrapper {
      position: relative;
      min-height: 480px;
      background: #ffffff;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 2rem 2rem 3.5rem; /* room for dots */
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      display: flex;
      flex-direction: column;
    }
    .slide.active {
      opacity: 1;
      visibility: visible;
      position: relative; /* re-enable flow */
    }

    .slide-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0b1a33;
      margin-bottom: 1.2rem;
      border-left: 6px solid #d32f2f;
      padding-left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .slide-title small {
      font-weight: 300;
      font-size: 0.9rem;
      color: #6b7f96;
    }

    /* ---------- TABLES ---------- */
    .table-wrap {
      flex: 1;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th {
      background: #f5f7fc;
      color: #1a2a4a;
      font-weight: 600;
      padding: 0.7rem 1.2rem;
      text-align: left;
      border-bottom: 2px solid #dce2ec;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    td {
      padding: 0.65rem 1.2rem;
      border-bottom: 1px solid #edf0f6;
      vertical-align: middle;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .rank-col {
      width: 60px;
      color: #6b7f96;
      font-weight: 600;
    }
    .name-col {
      font-weight: 500;
      color: #0b1a33;
    }
    .score-col {
      font-weight: 700;
      color: #0b1a33;
      text-align: right;
      width: 100px;
    }
    /* #1 rank – RED */
    tr.top1 td {
      background: #fef0ee;
    }
    tr.top1 .rank-col {
      color: #d32f2f;
      font-weight: 800;
    }
    tr.top1 .score-col {
      color: #d32f2f;
      font-size: 1.05rem;
    }

    /* ---------- NAVIGATION (arrows + dots) ---------- */
    .nav-controls {
      position: absolute;
      bottom: 1.2rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      z-index: 10;
      pointer-events: none;
    }
    .nav-controls button,
    .nav-controls .dot {
      pointer-events: auto;
    }

    .arrow {
      background: rgba(11, 26, 51, 0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .arrow:hover {
      background: #0b1a33;
      transform: scale(1.05);
    }
    .arrow:active {
      transform: scale(0.92);
    }

    .dots {
      display: flex;
      gap: 0.6rem;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c0c8d4;
      border: none;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      padding: 0;
    }
    .dot.active {
      background: #d32f2f;
      transform: scale(1.25);
    }
    .dot:hover {
      background: #0b1a33;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 700px) {
      body { padding: 0.8rem; }
      .header { flex-direction: column; align-items: flex-start; padding: 1rem 1.2rem; }
      .week-badge { white-space: normal; align-self: flex-start; font-size: 0.8rem; }
      .behavior-bar { font-size: 0.65rem; gap: 0.3rem 0.6rem; padding: 0.4rem 1rem; }
      .slide { padding: 1.2rem 1rem 4rem; }
      .slide-title { font-size: 1.2rem; }
      th, td { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
      .rank-col { width: 35px; }
      .score-col { width: 60px; }
      .logo-area h1 { font-size: 1.3rem; }
      .arrow { width: 32px; height: 32px; font-size: 0.9rem; }
    }
    @media (max-width: 500px) {
      .slide { padding: 0.8rem 0.5rem 3.8rem; }
      th, td { font-size: 0.65rem; padding: 0.3rem 0.4rem; }
      .behavior-bar .pill { font-size: 0.55rem; padding: 0.1rem 0.6rem; }
      .dot { width: 10px; height: 10px; }
    }
  </style>
</head>
<body>

<div class="slide-deck">
  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="logo-area">
      <svg viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 2 L2 46 L58 46 L30 2Z" fill="#d32f2f" stroke="#d32f2f" stroke-width="2"/>
        <path d="M30 10 L10 44 L50 44 L30 10Z" fill="#0b1a33" stroke="#0b1a33" stroke-width="1.5"/>
        <text x="30" y="38" font-size="14" font-weight="700" fill="#d32f2f" text-anchor="middle" font-family="Segoe UI, sans-serif">Δ</text>
      </svg>
      <h1><span>DELTA</span> · SIS Performance</h1>
    </div>
    <div class="week-badge" id="weekDisplay">Loading…</div>
  </div>

  <!-- ===== BEHAVIOR BAR ===== -->
  <div class="behavior-bar">
    <span class="pill">GREET ME</span>
    <span class="pill">RECOGNIZE ME</span>
    <span class="pill">BE KIND TO ME</span>
    <span class="pill">INFORM ME</span>
    <span class="behavior-divider">|</span>
    <span class="pill red">CONSISTENTLY EXECUTED</span>
    <span class="pill coach">Leaders as Coaches</span>
  </div>

  <!-- ===== SLIDESHOW ===== -->
  <div class="slides-wrapper" id="slidesWrapper">
    <!-- Slide 1: Teams -->
    <div class="slide active" data-index="0">
      <div class="slide-title">
        🏆 Top Performing Teams <small>SIS</small>
      </div>
      <div class="table-wrap" id="teamTableWrap">
        <div class="empty-state">Loading teams…</div>
      </div>
    </div>

    <!-- Slide 2: Agents -->
    <div class="slide" data-index="1">
      <div class="slide-title">
        ⭐ Top Performing Agents <small>SIS</small>
      </div>
      <div class="table-wrap" id="agentTableWrap">
        <div class="empty-state">Loading agents…</div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
      <button class="arrow" id="prevSlide" aria-label="Previous slide">‹</button>
      <div class="dots" id="dotsContainer"></div>
      <button class="arrow" id="nextSlide" aria-label="Next slide">›</button>
    </div>
  </div>
</div>

<script>
  // ---------- SLIDESHOW ENGINE ----------
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('dotsContainer');
  let currentIndex = 0;
  let autoPlayInterval = null;
  const AUTO_DELAY = 5500; // 5.5 seconds per slide

  // Build dots
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.dataset.index = i;
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  });
  const dots = dotsContainer.querySelectorAll('.dot');

  function goToSlide(index) {
    if (index === currentIndex) return;
    // wrap around
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    slides[currentIndex].classList.remove('active');
    dots[currentIndex].classList.remove('active');
    currentIndex = index;
    slides[currentIndex].classList.add('active');
    dots[currentIndex].classList.add('active');
    resetAutoPlay();
  }

  function nextSlide() { goToSlide(currentIndex + 1); }
  function prevSlide() { goToSlide(currentIndex - 1); }

  function resetAutoPlay() {
    if (autoPlayInterval) {
      clearInterval(autoPlayInterval);
      autoPlayInterval = null;
    }
    autoPlayInterval = setInterval(nextSlide, AUTO_DELAY);
  }

  // Event listeners
  document.getElementById('nextSlide').addEventListener('click', nextSlide);
  document.getElementById('prevSlide').addEventListener('click', prevSlide);

  // Pause on hover
  const wrapper = document.getElementById('slidesWrapper');
  wrapper.addEventListener('mouseenter', () => {
    if (autoPlayInterval) {
      clearInterval(autoPlayInterval);
      autoPlayInterval = null;
    }
  });
  wrapper.addEventListener('mouseleave', resetAutoPlay);

  // Keyboard arrows
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === 'ArrowLeft') prevSlide();
  });

  // ---------- RENDER TABLES (fetches data.json) ----------
  function renderTable(containerId, items, type) {
    const container = document.getElementById(containerId);
    if (!items || items.length === 0) {
      container.innerHTML = `<div class="empty-state" style="padding:2rem;color:#8a9bb0;">No data available.</div>`;
      return;
    }
    let html = `<table>
      <thead><tr>
        <th class="rank-col">#</th>
        <th>${type === 'team' ? 'Team Leader' : 'Agent Name'}</th>
        ${type === 'agent' ? '<th>Team Leader</th>' : ''}
        <th class="score-col">SIS</th>
      </tr></thead><tbody>`;
    items.forEach(item => {
      const isFirst = item.rank === 1;
      html += `<tr class="${isFirst ? 'top1' : ''}">
        <td class="rank-col">${item.rank}</td>
        <td class="name-col">${item.name}</td>
        ${type === 'agent' ? `<td>${item.team || '—'}</td>` : ''}
        <td class="score-col">${item.score}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function loadData() {
    try {
      const res = await fetch('data.json?' + Date.now());
      if (!res.ok) throw new Error('Failed to fetch');
      const data = await res.json();
      document.getElementById('weekDisplay').textContent = data.week || 'Week of …';
      renderTable('teamTableWrap', data.teams, 'team');
      renderTable('agentTableWrap', data.agents, 'agent');
    } catch (e) {
      document.getElementById('teamTableWrap').innerHTML = '<div class="empty-state" style="padding:2rem;color:#a13a3a;">⚠️ Could not load data. Refresh or try again later.</div>';
      document.getElementById('agentTableWrap').innerHTML = '';
    }
  }

  // ---------- START ----------
  loadData();
  resetAutoPlay(); // start auto-cycling
</script>

</body>
</html>
